name: Build EXE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Build
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./output
    - uses: actions/upload-artifact@v4
      with:
        name: BashirAliGSMUnlockTool
        path: ./output/BashirAliGSMUnlockTool.exe
